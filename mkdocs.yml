site_name: lorenzsw
site_description: Publication-oriented toolkit for chaotic and stochastic ionospheric modeling
theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/weather-windy
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
nav:
  - Home: index.md
  - Space Weather Context: space_weather_context.md
  - Chaos Model Details: chaos_model_details.md
  - Math: math_description.md
  - Example Forecast: example_forecast.md
  - Source Terms: source_terms.md
  - Profile Figures: profile_figures.md
  - Figures: figure_notes.md
  - Portability: portability.md
  - Repository Metadata: repository_metadata.md
  - References: references.md
  - Deployment: deployment.md
  - Usage: usage.md
